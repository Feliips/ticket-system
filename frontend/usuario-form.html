<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Usuario - Ticket System</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="usuario-form-page container">
      <section class="usuario-form-intro card">
        <span class="usuarios-kicker">Cadastro e edicao</span>
        <h1 id="usuario-form-title">Novo usuario</h1>
        <p>
          Preencha os dados do usuario para criar um novo acesso ou atualize informacoes de uma
          conta existente com seguranca e consistencia.
        </p>
        <a href="usuarios.html" class="back-link">← Voltar para usuarios</a>
      </section>

      <section class="card crud-form-box" aria-labelledby="usuario-form-title">
        <form id="usuarioForm" class="usuario-form-grid">
          <label class="usuarios-field">
            <span>Nome completo</span>
            <input type="text" id="nome" placeholder="Digite o nome do usuario" required />
          </label>

          <label class="usuarios-field">
            <span>Login</span>
            <input type="text" id="login" placeholder="Digite o login" required />
          </label>

          <div id="senhaContainer">
            <label class="usuarios-field">
              <span>Senha</span>
              <input type="password" id="senha" placeholder="Minimo de 6 caracteres" required />
            </label>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Salvar</button>
        </form>

        <form id="senhaForm" class="hidden usuario-password-box">
          <h3>Atualizar senha</h3>
          <label class="usuarios-field">
            <span>Nova senha</span>
            <input type="password" id="novaSenha" placeholder="Digite a nova senha" minlength="6" />
          </label>
          <button type="submit" class="btn-secondary">Atualizar senha</button>
        </form>

        <p id="feedbackForm" class="feedback-text" aria-live="polite"></p>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/usuario-form.js"></script>
  </body>
</html>
