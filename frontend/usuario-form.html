<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de Usuario - Ticket System</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="page-center">
      <section class="card crud-form-box" aria-labelledby="usuario-form-title">
        <h2 id="usuario-form-title">Novo usuario</h2>

        <form id="usuarioForm">
          <input type="text" id="nome" placeholder="Nome" required />
          <input type="text" id="login" placeholder="Login" required />

          <div id="senhaContainer">
            <input type="password" id="senha" placeholder="Senha" required />
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">Salvar</button>
        </form>

        <form id="senhaForm" class="hidden">
          <h3>Atualizar senha</h3>
          <input type="password" id="novaSenha" placeholder="Nova senha" minlength="6" />
          <button type="submit" class="btn-secondary">Atualizar senha</button>
        </form>

        <p id="feedbackForm" class="feedback-text" aria-live="polite"></p>
        <a href="usuarios.html" class="back-link">← Voltar para usuarios</a>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/usuario-form.js"></script>
  </body>
</html>
