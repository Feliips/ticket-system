<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - Ticket System</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="page-center">
      <section class="cadastro-box card" aria-labelledby="cadastro-title">
        <h2 id="cadastro-title">Cadastro de Usuário</h2>

        <form id="cadastroForm">
          <input type="text" id="nome" placeholder="Nome" required />
          <input type="text" id="login" placeholder="Login" required />
          <input type="password" id="senha" placeholder="Senha" required />

          <button type="submit" class="btn-primary">Cadastrar</button>
        </form>

        <a href="usuarios.html" class="btn-outline">Ver Usuarios</a>

        <a href="login.html" class="back-link"> ← Voltar para login </a>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/cadastro.js"></script>
  </body>
</html>
