<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Ticket System</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="login-container">
      <section class="login-box card" aria-labelledby="login-title">
        <h2 id="login-title">Bem-vindo de volta 👋</h2>
        <p>Faça login para acessar o sistema</p>

        <form id="loginForm">
          <input type="text" id="login" placeholder="Usuário" required />

          <input type="password" id="senha" placeholder="Senha" required />

          <button type="submit" class="btn-primary">Entrar</button>
        </form>

        <a href="cadastro.html" class="btn-secondary">Cadastrar Usuário</a>

        <a href="index.html" class="back-link"> ← Voltar para início </a>
      </section>
    </main>

    <script src="js/login.js"></script>
  </body>
</html>
